spring.application.name=WoodHub
# Cổng đọc từ env PORT nếu có (nền tảng deploy thường tự cấp PORT), mặc định 8081 khi chạy local
server.port=${PORT:8081}

# ===== Supabase PostgreSQL (Session Pooler) =====
# Cú pháp ${ENV_VAR:giá_trị_mặc_định}: ưu tiên đọc biến môi trường, nếu không có thì dùng default.
# url/username là định danh dự án (ít nhạy cảm) nên để default cho tiện chạy local.
# password KHÔNG có default → BẮT BUỘC cung cấp qua env var SPRING_DATASOURCE_PASSWORD
# (local: set env trước khi chạy; deploy: nhập trong dashboard) → không lộ secret trong code.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.cqxieqbwgvftdumoekce}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===== CORS =====
# Danh sách origin được phép gọi API (phân tách bằng dấu phẩy). Mặc định cho phép mọi cổng localhost (dev).
# Khi deploy: thêm domain FE thật, vd: app.cors.allowed-origins=http://localhost:*,https://woodhub.vercel.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:*}
